<!DOCTYPE html>
<html>
<head>
  <title>AI in Physics Teaching Survey</title>
</head>
<body>

  <h2>Teacher Survey: Use of AI in Teaching Physics</h2>

  <form id="surveyForm">
    <input type="text" id="name" placeholder="Teacher Name" required><br><br>

    <input type="text" id="school" placeholder="School / College" required><br><br>

    <label>Do you use AI in teaching Physics?</label><br>
    <select id="aiUsed">
      <option value="Yes">Yes</option>
      <option value="No">No</option>
      <option value="Sometimes">Sometimes</option>
    </select><br><br>

    <label>Confidence in using AI:</label><br>
    <select id="confidence">
      <option value="Low">Low</option>
      <option value="Medium">Medium</option>
      <option value="High">High</option>
    </select><br><br>

    <textarea id="comment" placeholder="Comment"></textarea><br><br>

    <button type="submit">Submit Survey</button>
  </form>

  <p id="message"></p>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbxjD5g2t6vXjFeXCTXEUfGtkQZ6SHJ-REI6obTDunpJbl-UGVxrGZWhL4DIC3b80qNC7A/exec";

    document.getElementById("surveyForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const data = {
        name: document.getElementById("name").value,
        school: document.getElementById("school").value,
        aiUsed: document.getElementById("aiUsed").value,
        confidence: document.getElementById("confidence").value,
        comment: document.getElementById("comment").value
      };

      fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify(data)
      })
      .then(response => response.json())
      .then(result => {
        document.getElementById("message").innerText = "Survey submitted successfully!";
        document.getElementById("surveyForm").reset();
      })
      .catch(error => {
        document.getElementById("message").innerText = "Error submitting survey.";
        console.error(error);
      });
    });
  </script>

</body>
</html>
